#Appearance

general {
    gaps_in = 4
    gaps_out = 4

    border_size = 2

    col.active_border = rgb(e6e6e6)
    col.inactive_border = rgb(020202)


    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 1
    dim_inactive = false
    dim_strength = 0.15

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 5
        render_power = 3
        color = rgb(000000)
    }

    blur {
        enabled = false
        size = 6
        passes = 2
        vibrancy = 0.3
    }
}

animations {
    enabled = yes

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    bezier = bleak, 0.1, 0.9, 0.2, 1.0

    animation = windows, 1, 5.0, bleak
    animation = windowsIn, 1, 4.5, bleak, popin 70%
    animation = windowsOut, 1, 3.5, bleak, popin 70%
    animation = fade, 1, 4.0, bleak
    animation = workspaces, 1, 4.5, bleak, fade
}

dwindle {
    pseudotile = true
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
