[window]
opacity = 0.92
padding = { x = 4, y = 4 }

[font]
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }

size = 11

[colors.primary]
background = "#000000"
foreground = "#ffffff"

[colors.cursor]
text = "#000000"
cursor = "#ffffff"

[colors.normal]
black   = "#000000"
red     = "#5a5a5a"
green   = "#7a7a7a"
yellow  = "#9a9a9a"
blue    = "#bcbcbc"
magenta = "#d0d0d0"
cyan    = "#e0e0e0"
white   = "#ffffff"

[colors.bright]
black   = "#2a2a2a"
red     = "#808080"
green   = "#a0a0a0"
yellow  = "#c0c0c0"
blue    = "#dcdcdc"
magenta = "#eeeeee"
cyan    = "#f5f5f5"
white   = "#ffffff"

[cursor]
style = "Block"
unfocused_hollow = true
